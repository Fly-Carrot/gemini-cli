name: Gemini-2 Upstream Compatibility

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

jobs:
  compat-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run upstream compatibility check
        run: ./scripts/gemini2-upstream-compat-check.sh
